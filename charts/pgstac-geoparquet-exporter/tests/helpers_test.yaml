suite: test helper functions
templates:
  - cronjob.yaml
  - configmap.yaml
tests:
  # Test fullname generation
  - it: should use release name and chart name for fullname by default
    release:
      name: my-release
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "my-release-pgstac-geoparquet-exporter"
        template: configmap.yaml

  - it: should use nameOverride when provided
    set:
      nameOverride: custom-name
    release:
      name: my-release
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "my-release-custom-name"
        template: configmap.yaml

  - it: should use fullnameOverride when provided
    set:
      fullnameOverride: totally-custom
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: totally-custom-config
        template: configmap.yaml

  - it: should truncate fullname to 63 characters
    set:
      fullnameOverride: this-is-a-very-long-name-that-exceeds-sixty-three-characters-and-should-be-truncated
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^[a-z0-9-]{1,63}-config$"
        template: configmap.yaml

  # Test namespace generation
  - it: should use release namespace by default
    release:
      namespace: default-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: default-namespace
        template: configmap.yaml

  - it: should use namespaceOverride when provided
    set:
      namespaceOverride: custom-namespace
    release:
      namespace: default-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace
        template: configmap.yaml

  # Test labels
  - it: should include all standard labels
    chart:
      version: 1.0.0
      appVersion: 1.2.3
    release:
      name: test-release
      service: Helm
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
        template: configmap.yaml
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: pgstac-geoparquet-exporter
        template: configmap.yaml
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release
        template: configmap.yaml
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "1.2.3"
        template: configmap.yaml
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
        template: configmap.yaml

  - it: should include custom labels
    set:
      labels:
        custom-label: custom-value
        environment: production
    asserts:
      - equal:
          path: metadata.labels["custom-label"]
          value: custom-value
        template: configmap.yaml
      - equal:
          path: metadata.labels.environment
          value: production
        template: configmap.yaml

  # Test selector labels
  - it: should set selector labels on pods
    release:
      name: test-release
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["app.kubernetes.io/name"]
          value: pgstac-geoparquet-exporter
        template: cronjob.yaml
        documentIndex: 0
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: test-release
        template: cronjob.yaml
        documentIndex: 0

  # Test image generation
  - it: should use default image with chart appVersion
    chart:
      appVersion: 1.5.0
    set:
      image:
        repository: ghcr.io/developmentseed/pgstac-geoparquet-exporter
        tag: ""
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: ghcr.io/developmentseed/pgstac-geoparquet-exporter:1.5.0
        template: cronjob.yaml
        documentIndex: 0

  - it: should use custom image tag when provided
    set:
      image:
        repository: ghcr.io/developmentseed/pgstac-geoparquet-exporter
        tag: v2.0.0
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: ghcr.io/developmentseed/pgstac-geoparquet-exporter:v2.0.0
        template: cronjob.yaml
        documentIndex: 0

  - it: should use custom image repository
    set:
      image:
        repository: my-registry.io/custom/exporter
        tag: latest
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: my-registry.io/custom/exporter:latest
        template: cronjob.yaml
        documentIndex: 0

  # Test chart label format
  - it: should format chart label correctly
    chart:
      name: pgstac-geoparquet-exporter
      version: 1.2.3
    asserts:
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: pgstac-geoparquet-exporter-1.2.3
        template: configmap.yaml

  - it: should handle chart version with plus sign
    chart:
      name: pgstac-geoparquet-exporter
      version: 1.0.0+build.123
    asserts:
      - matchRegex:
          path: metadata.labels["helm.sh/chart"]
          pattern: "pgstac-geoparquet-exporter-1.0.0_build.123"
        template: configmap.yaml
